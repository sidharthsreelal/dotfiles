#
# ~/.config/paru/paru.conf
#

[options]
PgpFetch
Devel
Provides
DevelSuffixes = -git -cvs -svn -bzr -darcs -always -hg -fossil

# Shows search results bottom-up (closest to prompt)
BottomUp

# Keeps sudo active during compilation/long builds so it doesn't time out
SudoLoop

# Clean build files after installation is complete
CleanAfter

# Review AUR and repo updates in a single combined view
CombinedUpgrade

# Show Arch Linux news when updating
NewsOnUpgrade
