# ============================================================
# HYPRLOCK — CATPPUCCIN MOCHA
# ~/.config/hypr/hyprlock.conf
# ============================================================

general {
    grace = 5
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
}

# ── Background ──────────────────────────────────────────────
background {
    monitor =
    path = ~/.config/hypr/wallpapers/a_black_and_white_picture_of_mountains_and_trees.png
    blur_passes = 3
    blur_size = 7
    brightness = 0.35
    contrast = 1.0
    vibrancy = 0.0
}

# ── Clock (large, centered-ish) ─────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(ffffffff)
    font_size = 90
    font_family = JetBrainsMono Nerd Font Thin
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 4
    shadow_color = rgba(00000088)
}

# ── Date ────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %-d')"
    color = rgba(ccccccff)
    font_size = 20
    font_family = JetBrainsMono Nerd Font Light
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(00000066)
}

# ── "Hello, username" label ─────────────────────────────────
label {
    monitor =
    text = Hi, $USER 
    color = rgba(ffffffff)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -60
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(00000066)
}

# ── Password input field ─────────────────────────────────────
input-field {
    monitor =
    size = 320, 54
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.18
    dots_center = true
    outer_color = rgba(ffffffff)
    inner_color = rgba(121212cc)
    font_color = rgba(ffffffff)
    fade_on_empty = true
    fade_timeout = 1200
    placeholder_text = <i><span foreground="##cccccc"> Password</span></i>
    hide_input = false
    rounding = 12
    check_color = rgba(ffffffff)
    fail_color = rgba(555555ff)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_timeout = 2000
    capslock_color = rgba(ccccccff)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -140
    halign = center
    valign = center
}