# ============================================================
# HYPRLAND CONFIG — CATPPUCCIN MOCHA
# ~/.config/hypr/hyprland.conf
# ============================================================


# ============================================================
# VARIABLES
# ============================================================

$mainMod    = SUPER
$terminal   = kitty
$browser    = brave
$fileManager = thunar
# To switch launchers, uncomment one and comment out the other:
# $launcher   = ~/.config/hypr/scripts/toggle_launcher.sh  # Wofi (Original toggle script)
# $launcher   = pkill wofi || wofi --show drun              # Wofi (Direct Toggle)
$launcher   = pkill rofi || rofi -show drun -theme ~/.config/rofi/config.rasi # Rofi (Wayland, instant with icons)




# ============================================================
# AUTOSTART
# ============================================================

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpaper
exec-once = sleep 0.5 && ~/.config/hypr/scripts/cycle_wallpapers.sh --restore
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1


# ============================================================
# ENVIRONMENT VARIABLES
# ============================================================

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,gtk3
env = GDK_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1


# ============================================================
# MONITOR
# ============================================================

# Blank name = auto-detect all connected monitors.
# To target a specific one: monitor = eDP-1, 1920x1080@60, 0x0, 1
# Find your monitor name with: hyprctl monitors
monitor = , preferred, auto, 1


# ============================================================
# GENERAL
# ============================================================

general {
    gaps_in          = 4
    gaps_out         = 8
    border_size      = 2

    # Monochromatic border colors
    col.active_border   = rgba(ffffffff)
    col.inactive_border = rgba(1a1a1aff)

    layout           = dwindle
    resize_on_border = true
    allow_tearing    = false
}


# ============================================================
# DECORATION
# ============================================================

decoration {
    rounding         = 10
    active_opacity   = 1.0
    inactive_opacity = 0.95

    blur {
        enabled          = true
        size             = 4
        passes           = 2
        vibrancy         = 0.1696
        new_optimizations = true
    }

    shadow {
        enabled      = true
        range        = 12
        render_power = 3
        color        = rgba(000000ee)
    }
}


# ============================================================
# ANIMATIONS
# ============================================================

animations {
    enabled = true

    # Bezier curves
    bezier = easeOut, 0.05, 0.9,  0.1,  1.05
    bezier = easeIn,  0.4,  0.0,  0.6,  1.0
    bezier = linear,  0.0,  0.0,  1.0,  1.0

    # Animations: name, enable, speed, curve[, style]
    animation = windows,              1, 5,  easeOut, slide
    animation = windowsOut,           1, 4,  easeIn,  slide
    animation = windowsMove,          1, 4,  easeOut
    animation = border,               1, 10, linear
    animation = borderangle,          1, 8,  linear, loop
    animation = fade,                 1, 5,  easeOut
    animation = fadeOut,              1, 4,  easeIn
    animation = workspaces,           1, 5,  easeOut, slide
    animation = specialWorkspace,     1, 5,  easeOut, slidefadevert 20%
}


# ============================================================
# LAYOUTS
# ============================================================

dwindle {
    preserve_split  = true
}

master {
    new_status  = slave
    mfact       = 0.55
    new_on_top  = false
}


# ============================================================
# INPUT
# ============================================================

input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0.1
    accel_profile = adaptive
    scroll_factor = 1.0

    touchpad {
        natural_scroll      = true
        disable_while_typing = true
        tap-to-click        = true
        scroll_factor       = 0.1
    }
}

# gestures block was removed in newer Hyprland — touchpad swipe is handled automatically


# ============================================================
# MISC
# ============================================================

misc {
    disable_hyprland_logo     = true
    disable_splash_rendering  = true
    mouse_move_enables_dpms   = true
    key_press_enables_dpms    = true
    focus_on_activate         = true
    animate_manual_resizes    = true
    enable_swallow            = true
    swallow_regex             = kitty
}


# ============================================================
# WINDOW RULES
# ============================================================

# Float specific apps
windowrule = float 1, match:class pavucontrol
windowrule = float 1, match:class nm-connection-editor
windowrule = float 1,        match:class waybar-bluetooth
windowrule = float 1,        match:class waybar-audio
windowrule = float 1,        match:class waybar-network
windowrule = size 700 450,   match:class waybar-bluetooth
windowrule = size 700 450,   match:class waybar-audio
windowrule = size 760 420,   match:class waybar-network
windowrule = center 1,       match:class waybar-bluetooth
windowrule = center 1,       match:class waybar-audio
windowrule = center 1,       match:class waybar-network
windowrule = stay_focused on,    match:class waybar-bluetooth
windowrule = stay_focused on,    match:class waybar-audio
windowrule = stay_focused on,    match:class waybar-network
windowrule = float 1, match:title Picture-in-Picture
windowrule = pin 1,   match:title Picture-in-Picture

# Terminal transparency
windowrule = opacity 0.97 0.90, match:class kitty

# Suppress spurious maximize requests from apps
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# Wofi blur rules
layerrule = blur 1, match:namespace wofi
layerrule = ignore_alpha 0.1, match:namespace wofi

# Rofi blur rules
layerrule = blur 1, match:namespace rofi
layerrule = ignore_alpha 0.1, match:namespace rofi








# ============================================================
# KEYBINDINGS
# ============================================================

# --- Apps ---
bind = $mainMod,       Return, exec, $terminal
bind = $mainMod,       Space,  exec, $launcher
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       B,      exec, $browser
bind = $mainMod,       A,      exec, antigravity-ide
bind = $mainMod SHIFT, W,      exec, ~/.config/hypr/scripts/cycle_wallpapers.sh
bind = $mainMod SHIFT, Q,      exec, ~/.config/hypr/scripts/cycle_wallpapers.sh --prev
bind = $mainMod SHIFT, O,      exec, opera --private

# --- Waybar Utilities ---
bind = $mainMod,       P,      exec, ~/.config/waybar/scripts/power-profile.sh toggle
bind = $mainMod,       O,      exec, kitty --class waybar-network -e nmtui
bind = $mainMod,       I,      exec, kitty --class waybar-bluetooth -e bluetui
bind = $mainMod,       U,      exec, kitty --class waybar-audio -e wiremix



# --- Window management ---
bind = $mainMod,       W,      killactive
bind = $mainMod,       Q,      exec, ~/.config/hypr/scripts/goto_empty_workspace.sh
bind = $mainMod,       F,      fullscreen,      0   # true fullscreen
bind = $mainMod SHIFT, F,      fullscreen,      1   # maximize (keeps gaps/bar)
bind = $mainMod,       V,      togglefloating
bind = $mainMod SHIFT, P,      pin
bind = $mainMod,       D,      pseudo               # dwindle pseudo-tile toggle
bind = $mainMod,       T,      layoutmsg, togglesplit          # dwindle split direction toggle

# --- Alt+Tab ---
bind = ALT,       Tab,   cyclenext
bind = ALT SHIFT, Tab,   cyclenext, prev

# --- Super+Tab (Cycle active workspaces) ---
bind = $mainMod,       Tab,   workspace, e+1
bind = $mainMod SHIFT, Tab,   workspace, e-1

# --- Focus (arrows + vim keys) ---
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, h,     movefocus, l
bind = $mainMod, l,     movefocus, r
bind = $mainMod, k,     movefocus, u
bind = $mainMod, j,     movefocus, d

# --- Move windows ---
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, h,     movewindow, l
bind = $mainMod SHIFT, l,     movewindow, r
bind = $mainMod SHIFT, k,     movewindow, u
bind = $mainMod SHIFT, j,     movewindow, d

# --- Resize (binde = repeats while held) ---
binde = $mainMod CTRL, left,  resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive,  40 0
binde = $mainMod CTRL, up,    resizeactive,  0 -40
binde = $mainMod CTRL, down,  resizeactive,  0  40
binde = $mainMod CTRL, h,     resizeactive, -40 0
binde = $mainMod CTRL, l,     resizeactive,  40 0
binde = $mainMod CTRL, k,     resizeactive,  0 -40
binde = $mainMod CTRL, j,     resizeactive,  0  40

# --- Workspaces 1–9 ---
bind = $mainMod,       1, workspace,       1
bind = $mainMod,       2, workspace,       2
bind = $mainMod,       3, workspace,       3
bind = $mainMod,       4, workspace,       4
bind = $mainMod,       5, workspace,       5
bind = $mainMod,       6, workspace,       6
bind = $mainMod,       7, workspace,       7
bind = $mainMod,       8, workspace,       8
bind = $mainMod,       9, workspace,       9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Scroll through workspaces with Super + mouse wheel
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# --- Mouse: move and resize windows ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Screenshots ---
bind = ,           Print, exec, grim ~/Pictures/screenshot-$(date +%F_%T).png
bind = $mainMod,   Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%F_%T).png

# --- System ---
bind = $mainMod,       L,      exec,    hyprlock
bind = $mainMod,       X,      exec,    pkill rofi || ~/.config/rofi/scripts/power-menu.sh
bind = $mainMod SHIFT, R,      exec,    hyprctl reload
bind = $mainMod SHIFT, E,      exit

# --- Media keys (bindel = repeating, bindl = works on lockscreen) ---
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-